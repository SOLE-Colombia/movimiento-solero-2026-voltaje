name: Production Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite ejecución manual

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: production
      NODE_VERSION: 22
      TZ: America/Bogota
      
    steps:
      - name: 📥 Checkout código fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para git history en Quartz
          submodules: recursive
          
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'quartz/package-lock.json'
          
      - name: 📦 Instalar dependencias de Quartz
        run: |
          cd quartz
          npm ci
          
      - name: ℹ️ Verificar instalación
        run: |
          echo "Node.js: $(node --version)"
          echo "npm: $(npm --version)"
          echo "Quartz instalado correctamente"
          
      - name: 🏗️ Build del sitio con Quartz
        run: |
          cd quartz
          npx quartz build
          
      - name: 📊 Verificar build
        run: |
          if [ -d "quartz/public" ]; then
            echo "✅ Build completado exitosamente"
            echo "📁 Archivos generados:"
            ls -lah quartz/public
          else
            echo "❌ Error: No se generó la carpeta public"
            exit 1
          fi
          
      - name: 🔧 Configurar Git para deploy
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions@github.com"
          
      - name: 📥 Checkout repositorio de producción
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PROD_REPO }}
          path: deploy-production
          token: ${{ secrets.PAT }}
          
      - name: 🚀 Deploy a producción
        run: |
          # Copiar archivos del build
          cp -r quartz/public/* deploy-production/
          
          # Ir al directorio de deploy
          cd deploy-production
          
          # Crear archivo .nojekyll (necesario para GitHub Pages)
          touch .nojekyll
          
          # Crear CNAME si tienes dominio personalizado
          # Descomenta la siguiente línea y cambia el dominio
          # echo "voltaje.solecolombia.org" > CNAME
          
          # Agregar todos los cambios
          git add .
          
          # Commit con SHA del commit original
          git commit -m "🚀 Deploy desde main - ${{ github.sha }}" || echo "No hay cambios nuevos"
          
          # Push a main
          git push origin main
          
      - name: 📊 Resumen del deploy
        run: |
          echo "✅ Deploy a PRODUCCIÓN completado"
          echo "📅 Fecha: $(date)"
          echo "🔗 Commit: ${{ github.sha }}"
          echo "👤 Por: ${{ github.actor }}"
          echo ""
          echo "🌐 El sitio estará disponible en:"
          echo "   https://<tu-usuario>.github.io/<repo-produccion>"
          echo ""
          echo "⏰ Puede tomar 1-2 minutos en actualizarse"



