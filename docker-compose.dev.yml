services:
  # Servicio principal de desarrollo
  voltaje-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_VERSION: "22"
    container_name: voltaje-dev
    hostname: voltaje-dev
    ports:
      - "8080:8080"  # Quartz dev server (puerto principal)
      - "8082:8082"  # Quartz dev server (puerto alternativo si 8080 está ocupado)
      - "8081:3000"  # Preview alternativo (puertos 3000-3001 reservados en Windows)
      - "3001:3001"  # WebSocket server para hot-reload
    volumes:
      # Montar todo el proyecto con cache optimizado
      - .:/workspace:cached
      # Named volumes para mejor rendimiento
      - quartz-node-modules:/workspace/quartz/node_modules
      - quartz-cache:/workspace/quartz/.quartz-cache
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - FORCE_COLOR=1
      - NPM_CONFIG_LOGLEVEL=info
    working_dir: /workspace/quartz
    entrypoint: []  # Sobrescribir entrypoint de la imagen base
    command: tail -f /dev/null  # Mantener contenedor vivo sin iniciar servidor
    stdin_open: true
    tty: true
    restart: unless-stopped
    # Healthcheck deshabilitado - el servidor se inicia manualmente
    networks:
      - voltaje-network

  # Servidor Python para scripts
  voltaje-scripts:
    build:
      context: .
      dockerfile: Dockerfile.scripts
    container_name: voltaje-scripts
    hostname: voltaje-scripts
    volumes:
      - .:/workspace:cached
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    working_dir: /workspace
    command: tail -f /dev/null
    restart: unless-stopped
    networks:
      - voltaje-network

volumes:
  quartz-node-modules:
    driver: local
    name: voltaje-quartz-node-modules
  quartz-cache:
    driver: local
    name: voltaje-quartz-cache

networks:
  voltaje-network:
    driver: bridge
    name: voltaje-network




