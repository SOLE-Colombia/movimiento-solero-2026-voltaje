services:
  # Servicio principal de desarrollo
  voltaje-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_VERSION: "22"
    container_name: voltaje-dev
    hostname: voltaje-dev
    ports:
      - "8080:8080"  # Quartz dev server
      - "8081:3000"  # Preview alternativo (puertos 3000-3001 reservados en Windows)
    volumes:
      # Montar todo el proyecto con cache optimizado
      - .:/workspace:cached
      # Named volumes para mejor rendimiento
      - quartz-node-modules:/workspace/quartz/node_modules
      - quartz-cache:/workspace/quartz/.quartz-cache
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - FORCE_COLOR=1
      - NPM_CONFIG_LOGLEVEL=info
    working_dir: /workspace/quartz
    command: npx quartz build --serve
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voltaje-network

  # Servidor Python para scripts
  voltaje-scripts:
    build:
      context: .
      dockerfile: Dockerfile.scripts
    container_name: voltaje-scripts
    hostname: voltaje-scripts
    volumes:
      - .:/workspace:cached
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    working_dir: /workspace
    command: tail -f /dev/null
    restart: unless-stopped
    networks:
      - voltaje-network

volumes:
  quartz-node-modules:
    driver: local
    name: voltaje-quartz-node-modules
  quartz-cache:
    driver: local
    name: voltaje-quartz-cache

networks:
  voltaje-network:
    driver: bridge
    name: voltaje-network




