name: Development Build and Deploy

on:
  push:
    branches:
      - desarrollo
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-development
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: desarrollo
      NODE_VERSION: 22
      TZ: America/Bogota

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🏗️ Build Quartz
        run: npx quartz build

      - name: 📥 Checkout repo desarrollo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PUBLIC_REPO }}
          path: deploy-dev
          token: ${{ secrets.PAT }}

      - name: 🚀 Deploy a desarrollo
        run: |
          # Limpieza segura del destino
          find deploy-dev -mindepth 1 -maxdepth 1 -not -name '.git' -exec rm -rf {} +

          cp -r public/* deploy-dev/

          cd deploy-dev
          touch .nojekyll

          if [ -n "$(git status --porcelain)" ]; then
            git config --global user.name "GitHub Actions Bot"
            git config --global user.email "github-actions@github.com"
            git add .
            git commit -m "🔧 Deploy dev ${{ github.sha }}"
            git push origin main
          else
            echo "Sin cambios."
          fi
