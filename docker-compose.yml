version: '3.8'

services:
  # Servicio de desarrollo con Quartz
  quartz-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sole-voltaje-quartz
    ports:
      - "8080:80"
    volumes:
      # Montar contenido en modo lectura para hot-reload durante desarrollo
      - ./quartz/content:/app/content:ro
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - sole-network

networks:
  sole-network:
    driver: bridge



